services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ukplanning
      POSTGRES_USER: ukplanning
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ukplanning"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://ukplanning:${DB_PASSWORD:-devpassword}@db:5432/ukplanning
      APP_PORT: ${APP_PORT:-8000}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
